<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <meta name="description" content="A modern, responsive todo list with dark mode, due dates, reminders, filters, and drag-and-drop reordering." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div class="hero__inner">
          <div class="hero__top">
            <h1 class="hero__title">T O D O</h1>
            <button
              type="button"
              class="theme-toggle"
              id="theme-toggle"
              aria-label="Toggle color theme"
            >
              <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4.5" fill="currentColor" />
                <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <line x1="12" y1="2.5" x2="12" y2="5" />
                  <line x1="12" y1="19" x2="12" y2="21.5" />
                  <line x1="2.5" y1="12" x2="5" y2="12" />
                  <line x1="19" y1="12" x2="21.5" y2="12" />
                  <line x1="4.8" y1="4.8" x2="6.6" y2="6.6" />
                  <line x1="17.4" y1="17.4" x2="19.2" y2="19.2" />
                  <line x1="4.8" y1="19.2" x2="6.6" y2="17.4" />
                  <line x1="17.4" y1="6.6" x2="19.2" y2="4.8" />
                </g>
              </svg>
              <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M20.5 14.5A8.5 8.5 0 0 1 9.5 3.5a8.5 8.5 0 1 0 11 11Z"
                  fill="currentColor"
                />
              </svg>
            </button>
          </div>

          <form class="new-todo" id="new-todo-form" autocomplete="off">
            <div class="new-todo__row">
              <span class="new-todo__check" aria-hidden="true"></span>
              <input
                type="text"
                id="new-todo-input"
                class="new-todo__input"
                placeholder="Create a new todo..."
                maxlength="200"
                aria-label="Create a new todo"
              />
              <button
                type="submit"
                id="new-todo-add"
                class="new-todo__add"
                aria-label="Add todo"
              >
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <line x1="12" y1="5" x2="12" y2="19" />
                  <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
              </button>
            </div>

            <div class="new-todo__meta">
              <label class="new-todo__date">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="3" y="4" width="18" height="17" rx="2" />
                  <line x1="16" y1="2" x2="16" y2="6" />
                  <line x1="8" y1="2" x2="8" y2="6" />
                  <line x1="3" y1="10" x2="21" y2="10" />
                </svg>
                <input
                  type="datetime-local"
                  id="new-todo-due"
                  class="new-todo__date-input"
                  aria-label="Due date and time (optional)"
                />
              </label>

              <label class="reminder-toggle" title="Notify me at the due time">
                <input type="checkbox" id="new-todo-remind" class="reminder-toggle__input" />
                <span class="reminder-toggle__pill">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                       stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M6 8a6 6 0 1 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
                    <path d="M10 21a2 2 0 0 0 4 0" />
                  </svg>
                  <span class="reminder-toggle__label">Remind me</span>
                </span>
              </label>
            </div>
          </form>
        </div>
      </header>

      <section class="card" aria-label="Todo list">
        <ul class="todo-list" id="todo-list" aria-live="polite"></ul>

        <div class="empty-state" id="empty-state" hidden>
          <p>No todos yet. Add one above to get started.</p>
        </div>

        <footer class="card__footer">
          <span class="counter" id="items-left">0 items left</span>

          <div class="filters" role="tablist" aria-label="Filter todos">
            <button type="button" class="filter is-active" data-filter="all" role="tab">All</button>
            <button type="button" class="filter" data-filter="active" role="tab">Active</button>
            <button type="button" class="filter" data-filter="completed" role="tab">Completed</button>
          </div>

          <button type="button" class="clear-completed" id="clear-completed">
            Clear Completed
          </button>
        </footer>
      </section>

      <p class="hint">Drag and drop to reorder your list</p>

      <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>
    </main>

    <script type="module" src="/script.js"></script>
  </body>
</html>
